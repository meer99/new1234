# Bicep Deployment Pipeline - dev → sit → uat → prod
# Pipeline variables needed: sqlAdminLogin, sqlAdminPassword (secret)

trigger:
  branches:
    include: [main]

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'ado-bcr'

stages:
  - ${{ each env in split('dev,sit,uat,prod', ',') }}:
    - stage: ${{ env }}
      variables:
        resourceGroup: 'rg-ae-bcr-${{ env }}'
      jobs:
        - deployment: Deploy
          environment: ${{ env }}
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self
                  - task: AzureCLI@2
                    displayName: 'Deploy to ${{ env }}'
                    inputs:
                      azureSubscription: $(azureServiceConnection)
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        az deployment group create \                         
                          --resource-group $(resourceGroup) \
                          --template-file main.bicep \
                          --parameters env=${{ env }} \
                          --parameters sqlAdminLogin=$(sqlAdminLogin) \
                          --parameters sqlAdminPassword=$(sqlAdminPassword)
